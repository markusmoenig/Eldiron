[project]
name = "Stonefall Dungeon"
version = "0.1.0"

[source]
main = "main.els"

[game]
start_region = "dungeon"
start_screen = "play"
client_mode = "3d"
terminal_mode = "roguelike"
simulation_mode = "hybrid"
game_tick_ms = 100
turn_timeout_ms = 300
#movement_units_per_sec = 16
#turn_speed_deg_per_sec = 420
collision_mode = "mesh"
auto_create_player = true
player = "player"

[viewport]
width = 960
height = 600
grid_size = 1
unit = "pixel"
resize = "fit"

[render]
# First-person blur transition start distance.
firstp_blur_near = 0.0 # 4

# First-person blur transition end distance.
firstp_blur_far = 0.0 #12

# Shadow strength (default 0.8).
shadow_strength = 0.85

# Enable/disable sun lighting
sun_enabled = false

# Ambient light color
ambient_color = "#AAAAA0"

# Ambient light strength (0.0 - 1.0)
ambient_strength = 0.39

# Fog color
fog_color = "#000000"

# Fog density (0.0 = no fog, higher values = denser fog)
fog_density = 1.32

# Avatar ambient fill contribution.
avatar_highlight_fill = 0.24

[post]
# Exposure multiplier before tone mapping.
exposure = 1.1
# Post luminance/brightness multiplier.
luminance = 1.0


[terminal]
text_updates = true

[build]
output = "build/stonefall-dungeon.eldiron"
