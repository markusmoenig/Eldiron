[professions.Fletcher]
description = "Makes arrows, bows, shafts, and other light ranged supplies."
services = ["craft"]
crafting_families = ["fletching", "woodworking"]

[professions.Innkeeper]
description = "Provides food, rest, rooms, rumors, and settlement services."
