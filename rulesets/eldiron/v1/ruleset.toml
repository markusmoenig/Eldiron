[ruleset]
id = "eldiron.official"
name = "Eldiron Official Ruleset"
version = "1.0.0"
schema_version = "1"
min_engine_version = "0.91.0"
status = "draft"

[schema]
attribute_case = "upper"
time_unit = "seconds"
distance_unit = "tiles"
cooldown_unit = "seconds"
damage_rounding = "round"

[assets.avatars.humanoid]
path = "assets/humanoid.eldiron_avatar"
description = "Default Eldiron humanoid avatar."

[visuals.defaults]
avatar = "humanoid"

[visuals.overrides]
tile_id = "explicit character tile_id wins over ruleset visuals"
avatar = "explicit character avatar/avatar_id wins over ruleset visuals"
empty_visual = "tile_id = \"\" or avatar = \"\" disables inherited default visuals"

[ui.container_templates.default]
mode = "procedural"
columns = 4
slot_size = 32
gap = 4
padding = 8
title = true
background_color = "#0a0c0fe6"
border_color = "#626974ff"
slot_color = "#10151bcc"
slot_border_color = "#626974ff"

[ui.container_templates.bag_small]
mode = "procedural"
columns = 3
rows = 2
slot_size = 32
gap = 4
padding = 8
title = true
background_color = "#0a0c0fe6"
border_color = "#626974ff"
slot_color = "#10151bcc"
slot_border_color = "#626974ff"

[loot.corpse]
enabled = true
item = "loot_corpse"
include_equipped = true
create_empty = false
despawn_when_empty = true
despawn_seconds = 600
despawn_before_respawn_seconds = 5
name = "{name}'s Remains"
description = "What remains of {name}. Open it to search the carried loot."

[respawn.npc]
enabled = true
delay_seconds = 60
health = "full"
clear_corpse_on_respawn = true

[resource_regen.MP]
amount = 1
per_seconds = 3
max = "MAX_MP"
when = "active"

[resources.wild_herb_node]
name = "Wild Herb Node"
description = "A small wild herb growth that can be gathered for fresh herbs."
kind = "herb"
action = "gather_herbs"
skill = "herbalism"
respawn = 300
amount = 2
produces = { item = "wild_herb", quantity = 2 }
visual_template = "herb_sprig"

[resources.green_wood_node]
name = "Green Wood Node"
description = "A young flexible wood growth that can be gathered for green wood."
kind = "wood"
action = "gather_wood"
skill = "woodworking"
respawn = 300
amount = 3
produces = { item = "green_wood", quantity = 3 }
visual_template = "spear_diagonal"

[resources.bird_nest_node]
name = "Bird Nest Node"
description = "A small nest that can be gathered for usable feathers."
kind = "nest"
action = "gather_feathers"
skill = "fletching"
respawn = 300
amount = 2
produces = { item = "feather", quantity = 2 }
visual_template = "arrow_diagonal"

[crafting]
profession_limit = 0
learn_mode = "use_based"
recipe_knowledge = "open_for_simple"

[skills.fletching]
name = "Fletching"
attribute = "DEX"
min = 0
max = 100

[skills.herbalism]
name = "Herbalism"
attribute = "WIS"
min = 0
max = 100

[skills.restoration]
name = "Restoration"
attribute = "WIS"
min = 0
max = 100

[skills.weaponsmithing]
name = "Weaponsmithing"
attribute = "STR"
min = 0
max = 100

[skills.armorsmithing]
name = "Armorsmithing"
attribute = "STR"
min = 0
max = 100

[skills.tailoring]
name = "Tailoring"
attribute = "DEX"
min = 0
max = 100

[skills.woodworking]
name = "Woodworking"
attribute = "DEX"
min = 0
max = 100

