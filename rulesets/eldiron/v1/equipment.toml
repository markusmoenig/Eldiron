icon = "torch"
visual_template = "torch_standing"
blade_color_index = 10
grip_color_index = 10
accent_color_index = 23
highlight_color_index = 14
tile_id = "05ab6adc-1631-4ed2-9857-f85820a7f1ad"
script = '''
fn event(event, value) {
    if event == "active" {
        set_emit_light(value);
        if value == true {
            set_tile("f76473d1-70f6-4649-8b0d-cbac627f93d8");
        } else {
            set_tile("05ab6adc-1631-4ed2-9857-f85820a7f1ad");
        }
    }
    if event == "intent" {
        let intent = value.string;
        if intent == "use" {
            if value.distance > 2 {
                message(value.subject_id, "{system.too_far_away}", "warning");
            } else {
                toggle_attr("active");
                block_events(1, "intent");
            }
        }
    }
}
'''

