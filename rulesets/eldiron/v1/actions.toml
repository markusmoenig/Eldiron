# Actions are the sandbox-facing gameplay verbs.
#
# The first pass mirrors the current working combat, spell, and interaction
# paths while giving them a shared data shape. Future sandbox actions such as
# mining, crafting, lockpicking, stealing, taming, and talking should grow from
# this same structure instead of becoming separate hardcoded systems.

[actions.basic_attack]
name = "Basic Attack"
description = "Strike an attackable target with the equipped weapon or an unarmed fallback."
kind = "attack"
intent = "attack"
requires = { ability = "basic_attack" }
target = "hostile_or_neutral_entity"
range = "weapon"
cooldown = 1.0
result = { damage = "weapon" }

[actions.basic_attack.ui]
icon = "basic_attack"

[actions.power_strike]
name = "Power Strike"
description = "Make a heavier martial attack with a longer recovery."
kind = "attack"
requires = { ability = "power_strike" }
target = "hostile_or_neutral_entity"
range = "weapon"
cooldown = 4.0
result = { damage = "abilities.power_strike.damage" }

[actions.power_strike.ui]
icon = "power_strike"

[actions.minor_heal]
name = "Minor Heal"
description = "Restore a small amount of health to yourself or an ally."
kind = "spell"
requires = { spell = "minor_heal" }
target = "friendly_or_self"
range = 5
cooldown = 4.0
cost = { MP = 3 }
consumes = [{ item = "blessed_herb", quantity = 1 }]
result = { healing = "spells.minor_heal.healing" }

[actions.minor_heal.ui]
icon = "minor_heal"

[actions.minor_heal.fx.cast]
preset = "rising_motes"
duration = 0.5
density = "dense"
size = "small"

[actions.minor_heal.fx.impact]
preset = "rising_motes"
duration = 0.8
density = "dense"
size = "small"

[actions.holy_light]
name = "Holy Light"
description = "Call down holy light to damage an attackable creature."
kind = "spell"
requires = { spell = "holy_light" }
target = "hostile_or_neutral_entity"
range = 5
cooldown = 5.0
cost = { MP = 4 }
consumes = []
result = { damage = "spells.holy_light.damage" }

[actions.holy_light.ui]
icon = "holy_light"

[actions.holy_light.fx.cast]
preset = "holy_glow"

[actions.holy_light.fx.travel]
preset = "holy_bolt"

[actions.holy_light.fx.impact]
preset = "hit_burst"
colors = ["warm_white", "gold"]
duration = 0.65
density = "dense"
size = "medium"

[actions.take]
name = "Take"
description = "Pick up a nearby ground item."
kind = "interaction"
intent = "take"
target = "ground_item"
range = 1.5
cooldown = 0.0
result = { take = true }

[actions.take.ui]
icon = "take"

[actions.gather_herbs]
name = "Gather Herbs"
description = "Gather wild herbs from a nearby resource node."
kind = "gather"
skill = "herbalism"
required_skill = 0
target = "resource_node"
range = 1.5
cooldown = 2.0
result = { item = "wild_herb", quantity = 2 }

[actions.gather_herbs.ui]
icon = "gather_herbs"

[actions.gather_wood]
name = "Gather Wood"
description = "Collect green wood from a nearby resource node."
kind = "gather"
skill = "woodworking"
required_skill = 0
target = "resource_node"
range = 1.5
cooldown = 3.0
result = { item = "green_wood", quantity = 3 }

[actions.gather_wood.ui]
icon = "gather_wood"

[actions.gather_feathers]
name = "Gather Feathers"
description = "Collect feathers from a nearby resource node."
kind = "gather"
skill = "fletching"
required_skill = 0
target = "resource_node"
range = 1.5
cooldown = 2.0
result = { item = "feather", quantity = 2 }

[actions.gather_feathers.ui]
icon = "gather_feathers"

[actions.craft_blessed_herb]
name = "Bless Herb"
description = "Bless a wild herb into a simple restoration reagent."
kind = "craft"
recipe = "blessed_herb"
target = "self"
cooldown = 2.0

[actions.craft_blessed_herb.ui]
icon = "blessed_herb"

[actions.craft_wooden_arrows]
name = "Fletch Arrows"
description = "Craft wooden arrows from green wood and feathers."
kind = "craft"
recipe = "wooden_arrows"
target = "self"
cooldown = 3.0

[actions.craft_wooden_arrows.ui]
icon = "wooden_arrows"

[actions.craft_hunting_bow]
name = "Craft Bow"
description = "Craft a simple hunting bow from green wood."
kind = "craft"
recipe = "hunting_bow"
target = "self"
cooldown = 8.0

[actions.craft_hunting_bow.ui]
icon = "hunting_bow"
